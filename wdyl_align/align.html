<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extract XLIFF</title>
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-gray: #F5F5F7;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --border-color: #D2D2D7;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fbfbfd;
            /* 添加一个柔和的背景渐变，模拟 macOS 桌面 */
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-primary);
        }

        .container {
            background-color: var(--card-bg);
            backdrop-filter: blur(20px); /* 毛玻璃效果 */
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h2 {
            text-align: center;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 22px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: rgba(255, 255, 255, 0.9);
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15); /* Apple 风格的聚焦光晕 */
        }

        input[type="file"] {
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        /* 自定义文件上传样式稍微美化 */
        input[type="file"]::file-selector-button {
            border: none;
            background: var(--apple-gray);
            padding: 8px 12px;
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            margin-right: 10px;
            font-weight: 500;
            transition: background 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background: #e5e5ea;
        }

        .input-with-btn {
            display: flex;
            gap: 10px;
        }

        .input-with-btn input {
            flex: 1;
        }

        /* 辅助按钮样式 (Secondary Button) */
        #btn_t1 {
            background-color: var(--apple-gray);
            color: var(--text-primary);
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        #btn_t1:hover {
            background-color: #e5e5ea;
        }

        #btn_t1:active {
            transform: scale(0.96);
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        /* 主要按钮样式 (Primary Button) */
        input[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: var(--apple-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 2px 10px rgba(0, 122, 255, 0.2);
        }

        input[type="submit"]:hover {
            background-color: #0062cc;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        input[type="submit"]:active {
            transform: scale(0.98);
        }

        .hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            margin-left: 2px;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Align Documents</h2>
    <form action="/extract_xliff" method="post" enctype="multipart/form-data">
        
        <div class="form-group">
            <label for="file">English Document</label>
            <input type="file" name="file" id="file" required />
        </div>

        <div class="form-group">
            <label for="file">Chinese Document</label>
            <input type="file" name="file" id="file" required />
        </div>

        <!-- <div class="form-group">
            <label for="extract_xliff_trans_id">Transaction ID</label>
            <div class="input-with-btn">
                <input type="text" name="transId" id="extract_xliff_trans_id" placeholder="Auto-generated" readonly />
                <button type="button" id="btn_t1">Generate</button>
            </div>
            <div class="hint">Unique identifier for this extraction task.</div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="source">Source Language</label>
                <input type="text" name="source" id="source" value="en" />
            </div>
            <div class="form-group">
                <label for="target">Target Language</label>
                <input type="text" name="target" id="target" value="zh" />
            </div>
        </div> -->

        <div class="form-group" style="margin-top: 30px;">
            <input type="submit" value="Align Files" />
        </div>
    </form>
</div>

<script type="text/javascript">
  document.getElementById("btn_t1").addEventListener('click', function () {
    // 生成更简洁的 ID
    const randomPart = Math.random().toString(36).slice(2, 8) + Math.random().toString(36).slice(2, 8);
    const input = document.getElementById("extract_xliff_trans_id");
    input.value = "new_" + randomPart;
    
    // 添加一个简单的闪烁动画反馈
    input.style.backgroundColor = "#e8f2ff";
    setTimeout(() => {
        input.style.backgroundColor = "rgba(255, 255, 255, 0.9)";
    }, 300);
  });
</script>

</body>
</html>
